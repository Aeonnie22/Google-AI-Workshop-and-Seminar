<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuadFlow Lite - Student Council Suite</title>
    <!-- Standalone Style Sheet with Elite Design Systems -->
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>

    <!-- Main Responsive Workspace Container Frame -->
    <div class="preview-container">
      
      <!-- Top Controller Floating Switch to Toggle Smartphone Chassis -->
      <div class="device-toggle-rail">
        <span class="font-mono text-xs">
          VIEW MODE: <strong style="color:var(--banana-yellow);" class="view-txt">MOBILE DESIGN</strong>
        </span>
        <button class="device-toggle-btn active" id="btn-toggle-frame">
          <svg style="width:12px; height:12px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
          Toggle Device Frame
        </button>
      </div>

      <!-- Smartphone Emulator Chassis -->
      <div class="phone-chassis" id="phone-chassis-id">
        
        <!-- Dynamic Speaker / Camera Notch -->
        <div class="phone-notch">
          <div class="phone-notch-speaker"></div>
        </div>

        <!-- Simulated Mobile Status Bar -->
        <div class="status-bar">
          <span id="native-clock-time">04:51 UTC</span>
          <div class="status-bar-icons">
            <!-- Simulated Signal / Cellular / Battery icons -->
            <svg style="width:12px; height:12px; color:var(--banana-lime);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071a10.5 10.5 0 0114.14 0M1.399 5.585a18.337 18.337 0 0121.202 0"></path></svg>
            <svg style="width:12px; height:12px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span style="font-size:0.6rem; color:var(--banana-lime)">100%</span>
          </div>
        </div>

        <!-- Outer Application Inside Wrap -->
        <div class="app-content-wrapper">
          
          <!-- Static Top Sticky Title Brand Header -->
          <header class="app-header">
            <div class="brand-section">
              <div class="brand-logo-node"></div>
              <div class="brand-text">
                <h1>QuadFlow<span>.pro</span></h1>
                <div class="brand-subtitle">STUDENT COUNCIL OFFICE METRICS</div>
              </div>
            </div>
            
            <button class="reset-button" id="btn-global-reset" title="Reset Offline Simulation Storage">
              <svg style="width:12px; height:12px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15.19M9 5.5a.5.5 0 00-.5-.5h-4a.5.5 0 000 1h2.5a.5.5 0 00.5-.5V2a.5.5 0 00-1 0v2H4m11 16.5a.5.5 0 00.5.5h4a.5.5 0 000-1h-2.5a.5.5 0 00-.5.5V22a.5.5 0 001 0v-2"></path></svg>
            </button>
          </header>

          <!-- Dynamic Role Profile Selector Placement Container -->
          <div id="role-panel-inject"></div>

          <!-- Academic Dynamic Altimeter (Hell Week Control) -->
          <div id="hell-week-panel-inject"></div>

          <!-- Active Tabs View Interface Point -->
          <main id="main-inject-point">
            <!-- Dynamic Contents injected by app.js rendering modules -->
          </main>

          <!-- Sticky Bottom Navigation Dock -->
          <nav class="bottom-nav-dock" id="app-nav-dock-inject">
            <!-- Dynamic Navigation Buttons -->
          </nav>

        </div>

        <!-- Simulated Bottom Chassis Virtual Pill Spacer -->
        <div class="virtual-home-pill-bar">
          <div class="virtual-home-pill"></div>
        </div>

      </div>

    </div>

    <!-- Centralized Modals Backdrop Container -->
    <div class="overlay-scrim" id="native-modals-overlay" style="display:none;"></div>

    <!-- Load Core Vanilla Application Engine Script -->
    <script src="./src/app.js" defer></script>
  </body>
</html>
